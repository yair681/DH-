services:
  - type: web
    name: royal-med-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SYSTEM_PASSWORD
        sync: false
      - key: SECRET_KEY
        sync: false
